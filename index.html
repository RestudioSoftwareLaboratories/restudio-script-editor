<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSP آمن ومبسط -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; img-src * data: blob:; font-src * data:;">
    <title>Restudio · Script Editor</title>
    <link href="https://fonts.cdnfonts.com/css/tiny5" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <link rel="icon" href="https://i.postimg.cc/66MLbbg8/restudio-profile.png" type="image/png">

    <!-- math.js للتعبيرات الرياضية الآمنة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Consolas', monospace; margin: 0; padding: 0; background: #1e1e1e; color: #f5f5f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #000; padding: 8px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .logo { height: 30px; }
        .header-left span { font-family: 'Tiny5', sans-serif; color: #fff; font-size: 20px; }
        .header-buttons { display: flex; gap: 10px; }
        .btn { background: none; border: none; cursor: pointer; padding: 5px; width: 40px; height: 40px; border-radius: 4px; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn:hover { background: #333; }
        .btn svg { width: 24px; height: 24px; fill: #fff; }
        .btn .play-btn { fill: #2eb346; }

        .main-content { display: flex; flex: 1; overflow: hidden; }
        #editor-container { flex: 2; border-right: 1px solid #333; }
        .console-panel { flex: 1; background: #1a1a1a; display: flex; flex-direction: column; }
        .console-header { background: #2d2d2d; padding: 10px; font-family: 'Tiny5', sans-serif; }
        .console-output { flex: 1; padding: 10px; font-size: 14px; overflow-y: auto; background: #121212; }
        .log-entry { margin-bottom: 4px; padding-left: 8px; font-family: 'Consolas', monospace; border-left: 2px solid transparent; display: flex; align-items: flex-start; gap: 6px; }
        .log-icon { font-family: 'Material Symbols Outlined'; font-size: 18px; line-height: 1.4; user-select: none; }
        .log-info { color: #569CD6; border-left-color: #569CD6; }
        .log-success { color: #6A9955; border-left-color: #6A9955; }
        .log-error { color: #F44747; border-left-color: #5470; }
        .log-warning { color: #ff9800; border-left-color: #ff9800; }
        .log-input { color: #9cdcfe; border-left-color: #9cdcfe; }
        .timestamp { color: #666; margin-right: 8px; }

        .dropdown-menu { position: absolute; top: 55px; right: 15px; background: #2d2d2d; border: 4px solid #444; display: none; z-index: 1000; min-width: 200px; }
        .dropdown-menu.show { display: block; }
        
        .share-menu { position: absolute; top: 55px; right: 70px; background: #2d2d2d; border: 4px solid #444; display: none; z-index: 1000; min-width: 180px; }
        .share-menu.show { display: block; }
        
        .dropdown-item { padding: 10px 20px; color: #fff; cursor: pointer; font-family: 'Tiny5', sans-serif; display: flex; align-items: center; gap: 10px; }
        .dropdown-item:hover { background: #3d3d3d; }
        .dropdown-item svg { width: 20px; height: 20px; fill: #fff; }

        /* رسالة pixel style */
        .pixel-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2d2d;
            border: 4px solid #6A9955;
            padding: 12px 24px;
            z-index: 9999;
            box-shadow: 6px 6px 0px #000;
            font-family: 'tiny5', cursive;
            font-size: 30px;
            color: #6A9955;
            text-align: center;
            animation: pixelFade 2s ease-in-out;
            pointer-events: none;
            white-space: nowrap;
        }

        @keyframes pixelFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        #splash {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 460px;
            background: #2a2a2a;
            border: 1px solid #000;
            border-radius: 6px;
            overflow: hidden;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #banner {
            background: #000;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            border-bottom: 1px solid #111;
        }

        #banner img { height: 22px; }
        #close { font-size: 14px; color: #777; cursor: pointer; user-select: none; }
        #close:hover { color: #fff; }
        #content { padding: 16px; }
        .title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: #fff; }
        .text { font-size: 13px; opacity: 0.85; margin-bottom: 12px; }
        .notice { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #ff9f43; margin-bottom: 14px; }
        .notice .material-symbols-outlined { font-size: 16px; line-height: 1; }
        .buttons { display: flex; gap: 10px; }
        .splash-btn { padding: 6px 14px; background: #3a3a3a; border: 1px solid #444; color: #eee; border-radius: 4px; cursor: pointer; }
        .splash-btn:hover { background: #4a4a4a; }
    </style>
</head>

<!-- Monaco Editor -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script>
(function(){
    "use strict";
    
    const SITE_URL = 'https://restudio-games.github.io/restudio-script-editor/';
    
    // دالة إظهار رسالة pixel
    function showPixelToast(message) {
        const toast = document.createElement('div');
        toast.className = 'pixel-toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.remove();
        }, 2000);
    }
    
    // دالة نسخ النص إلى الحافظة
    async function copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
            addToConsole(` ${text}`, 'success');
            showPixelToast('The text has been copied');
        } catch (err) {
            // Fallback للمتصفحات القديمة
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            addToConsole(` ${text}`, 'success');
            showPixelToast('The text has been copied');
        }
    }
    
    // Global variables
    let monacoEditor;
    let scriptLines = [];
    let currentLineIndex = 0;
    let isRunning = false;
    let variables = {};
    let varTypes = {};
    let lastLogMessage = '';
    let calculatorEnabled = false;
    
    // Console functions
    window.clearConsole = function() {
        document.getElementById('consoleOutput').innerHTML = '';
    };
    
    function addToConsole(msg, type = 'info') {
        const out = document.getElementById('consoleOutput');
        const timestamp = new Date().toLocaleTimeString('en-US', { hour12: false });
        const icon = type === 'success' ? 'check_circle' : type === 'error' ? 'error' : type === 'warning' ? 'warning' : type === 'input' ? 'input' : 'info';
        const safeMsg = String(msg).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        out.innerHTML += `<div class="log-entry log-${type}"><span class="log-icon material-symbols-outlined">${icon}</span><span><span class="timestamp">[${timestamp}]</span> ${safeMsg}</span></div>`;
        out.scrollTop = out.scrollHeight;
    }
    
    function stopExecution() {
        isRunning = false;
        addToConsole('Execution stopped.', 'warning');
    }
    
    function resetInterpreter() {
        variables = {};
        varTypes = {};
        lastLogMessage = '';
        calculatorEnabled = false;
    }
    
    function validateType(varName, value) {
        const type = varTypes[varName];
        if (!type) return true;
        if (type === 'Dnumber' && (isNaN(parseFloat(value)) || !isFinite(value) || value.toString().includes(' '))) {
            addToConsole(`Type error: "${varName}" must be decimal.`, 'error'); return false;
        }
        if (type === 'var' && !/^-?\d+$/.test(value.toString())) {
            addToConsole(`Type error: "${varName}" must be integer.`, 'error'); return false;
        }
        if (type === 'character' && value.length !== 1) {
            addToConsole(`Type error: "${varName}" must be single character.`, 'error'); return false;
        }
        if (type === 'word' && /\s/.test(value)) {
            addToConsole(`Type error: "${varName}" must not contain spaces.`, 'error'); return false;
        }
        if (type === 'TFvar' && value !== 'true' && value !== 'false') {
            addToConsole(`Type error: "${varName}" must be true/false.`, 'error'); return false;
        }
        return true;
    }
    
    window.openDocs = function() {
        window.open('https://restudio-games.github.io/Restudio-Docs-For-Roland-Script/', '_blank');
    };
    
    // دوال المشاركة - نسخ الرابط
    window.shareOnDiscord = function() {
        copyToClipboard(SITE_URL);
        document.getElementById('shareMenu').classList.remove('show');
    };
    
    window.shareOnTwitter = function() {
        copyToClipboard(SITE_URL);
        document.getElementById('shareMenu').classList.remove('show');
    };
    
    // ================ دوال المصفوفات والحروف ================
    
    function parseArrayDefinition(content) {
        let cleanContent = content.replace(/^\[|\]$/g, '').trim();
        let items = cleanContent.split(/[,\n]+/).map(item => item.trim()).filter(item => item);
        return items;
    }
    
    function safeEvaluate(expression) {
        try {
            let evalExpr = expression;
            Object.entries(variables).forEach(([key, value]) => {
                if (value !== null && !isNaN(value) && isFinite(value)) {
                    evalExpr = evalExpr.replace(new RegExp('\\b' + key + '\\b', 'g'), value);
                }
            });
            const result = math.evaluate(evalExpr);
            return result.toString();
        } catch (e) {
            return expression;
        }
    }
    
    async function executeLine(line) {
        if (line.startsWith('bookname:')) return 'OK';
        if (line === 'end!' || line === 'pass!') { 
            addToConsole('Script terminated.', 'success'); 
            return 'STOP'; 
        }
        
        // line for class: - تعريف مصفوفة
        if (line.startsWith('line for class:')) {
            const arrayContent = line.substring('line for class:'.length).trim();
            const arrayName = 'line_for_class';
            const items = parseArrayDefinition(arrayContent);
            variables[arrayName] = items;
            varTypes[arrayName] = 'array';
            addToConsole(`Array defined with ${items.length} items: [${items.join(', ')}]`, 'success');
            return 'OK';
        }
        
        // line for class = ("Arrays")
        const arrayPrintMatch = line.match(/line for class\s*=\s*\("([^"]+)"\)/);
        if (arrayPrintMatch) {
            const arrayName = 'line_for_class';
            if (variables[arrayName] && Array.isArray(variables[arrayName])) {
                const title = arrayPrintMatch[1];
                addToConsole(`${title}: [${variables[arrayName].join(', ')}]`, 'success');
            } else {
                addToConsole('No array defined yet.', 'warning');
            }
            return 'OK';
        }
        
        // Cletters اسم_المتغير:("نص")
        if (line.startsWith('Cletters ')) {
            const clettersMatch = line.match(/^Cletters\s+(\w+):\("(.+)"\)$/);
            if (clettersMatch) {
                const varName = clettersMatch[1];
                const text = clettersMatch[2];
                const combined = text.replace(/\s+/g, '');
                variables[varName] = combined;
                varTypes[varName] = 'word';
                addToConsole(`Cletters: "${varName}" = "${combined}"`, 'success');
            } else {
                addToConsole(`Invalid Cletters format. Use: Cletters varName:("t e x t")`, 'error');
            }
            return 'OK';
        }
        
        // الأوامر الأساسية
        const defMatch = line.match(/^(var|Dnumber|character|word|TFvar)\s*=\s*([^;]+);?$/);
        if (defMatch) {
            const [, type, varName] = defMatch;
            variables[varName.trim()] = null;
            varTypes[varName.trim()] = type;
            addToConsole(`Defined: ${varName.trim()} (${type})`, 'info');
            return 'OK';
        }
        
        const assignMatch = line.match(/^(\w+)\s*=\s*(.+);?$/);
        if (assignMatch && assignMatch[1] !== 'reload!') {
            const varName = assignMatch[1];
            let value = assignMatch[2].trim().replace(/;$/, '');
            if ((value.startsWith('"') && value.endsWith('"')) || (value.startsWith("'") && value.endsWith("'"))) {
                value = value.slice(1, -1);
            }
            
            if (varName.includes('[') && varName.includes(']')) {
                const arrayMatch = varName.match(/^(\w+)\[(\d+)\]$/);
                if (arrayMatch) {
                    const arrName = arrayMatch[1];
                    const index = parseInt(arrayMatch[2]);
                    if (variables[arrName] && Array.isArray(variables[arrName])) {
                        if (index >= 0 && index < variables[arrName].length) {
                            variables[arrName][index] = value;
                            addToConsole(`Array ${arrName}[${index}] = ${value}`, 'info');
                        } else {
                            addToConsole(`Array index out of bounds: ${index}`, 'error');
                        }
                    }
                    return 'OK';
                }
            }
            
            if (!variables.hasOwnProperty(varName) && varName !== 'msg.out') { 
                addToConsole(`Error: "${varName}" not defined.`, 'error'); 
                return 'ERROR'; 
            }
            if (varTypes[varName] && !validateType(varName, value)) return 'ERROR';
            variables[varName] = value;
            addToConsole(`Assigned: ${varName} = ${value}`, 'info');
            return 'OK';
        }
        
        if (line.startsWith('get lib:')) {
            const m = line.match(/get lib:\("(.+)"\)/);
            if (m && m[1] === 'calculator') { 
                calculatorEnabled = true; 
                addToConsole('Calculator library loaded (using math.js).', 'success'); 
            }
            return 'OK';
        }
        
        if (line.startsWith('msg.log:')) {
            const m = line.match(/msg\.log:\("(.+)"\)/);
            if (m) {
                let content = m[1];
                Object.entries(variables).forEach(([key, value]) => {
                    if (value !== null) {
                        if (Array.isArray(value)) {
                            content = content.replace(new RegExp('\\b' + key + '\\b', 'g'), `[${value.join(', ')}]`);
                        } else {
                            content = content.replace(new RegExp('\\b' + key + '\\b', 'g'), value);
                        }
                    }
                });
                if (calculatorEnabled && /^[\d\s\+\-\*\/\(\)\.]+$/.test(content)) {
                    content = safeEvaluate(content);
                }
                lastLogMessage = content;
                addToConsole(content, 'success');
            }
            return 'OK';
        }
        
        if (line.startsWith('reload! =')) {
            const m = line.match(/reload!\s*=\s*\(?"?(\d+)"?\)?/);
            if (m && lastLogMessage) {
                const times = parseInt(m[1]);
                for(let i = 0; i < times; i++) {
                    addToConsole(`[${i+1}] ${lastLogMessage}`, 'info');
                }
            } else { 
                addToConsole('No message to repeat.', 'warning'); 
            }
            return 'OK';
        }
        
        if (line.startsWith('if var')) {
            const m = line.match(/if var\s+(\w+)\s*=\s*\(?"?([^")]+)"?\)?/);
            if (m) {
                let expected = m[2].replace(/[";]/g, '').trim();
                if ((expected.startsWith('"') && expected.endsWith('"')) || (expected.startsWith("'") && expected.endsWith("'"))) {
                    expected = expected.slice(1, -1);
                }
                if (variables[m[1]] != expected) { 
                    addToConsole(`Condition false, skipping next.`, 'error'); 
                    currentLineIndex++; 
                } else {
                    addToConsole(`Condition true: ${m[1]} = ${variables[m[1]]}`, 'success');
                }
            }
            return 'OK';
        }
        
        if (line.startsWith('msg.out:')) {
            const m = line.match(/msg\.out:\("(.+)"\)/);
            if (m) {
                const inp = prompt(m[1], '');
                variables['msg.out'] = inp !== null ? inp : '';
                addToConsole(`Input: ${variables['msg.out']}`, 'success');
            }
            return 'OK';
        }
        
        if (line.startsWith('if typed')) {
            const m = line.match(/if typed\s+(\d+)\s+in\s+(\w+)/);
            if (m) {
                const inp = prompt(`Enter value for ${m[2]} (expected ${m[1]}):`, '');
                if (inp !== null) {
                    variables[m[2]] = inp;
                    if (inp != m[1]) { 
                        addToConsole(`Incorrect, skipping next.`, 'error'); 
                        currentLineIndex++; 
                    } else {
                        addToConsole(`Correct!`, 'success');
                    }
                }
            }
            return 'OK';
        }
        
        if (line.startsWith('greet')) {
            const m = line.match(/greet\s+(\w+):\("(.+)"\)/);
            if (m) { 
                variables[m[1]] = m[2]; 
                addToConsole(`Hello ${m[2]}!`, 'success'); 
            }
            return 'OK';
        }
        
        if (line) addToConsole(`Unknown: ${line}`, 'warning');
        return 'OK';
    }
    
    async function executeNextLine() {
        while (isRunning && currentLineIndex < scriptLines.length) {
            const result = await executeLine(scriptLines[currentLineIndex]);
            if (result === 'STOP') { 
                stopExecution(); 
                return; 
            }
            currentLineIndex++;
        }
        if (isRunning) { 
            addToConsole('Script finished.', 'success'); 
            isRunning = false; 
        }
    }
    
    window.runScript = function() {
        if (!monacoEditor) return;
        if (isRunning) { 
            addToConsole('Already running.', 'warning'); 
            return; 
        }
        clearConsole();
        resetInterpreter();
        const code = monacoEditor.getValue();
        scriptLines = code.split('\n').map(l => l.trim()).filter(l => l);
        if (!scriptLines.length || scriptLines[0] !== 'hi roland.script!') {
            addToConsole('Error: Must start with "hi roland.script!"', 'error'); 
            return;
        }
        isRunning = true;
        currentLineIndex = 1;
        addToConsole('Starting execution...', 'info');
        executeNextLine();
    };
    
    window.loadExample = function() {
        if (!monacoEditor) return;
        monacoEditor.setValue(`hi roland.script!
bookname:("Arrays & Cletters Example")

line for class: 
[عمار, علي, احمد,
عمار, محمد, صالح,
حمد, عزيز, خالد]

line for class = ("Arrays")
msg.log:("Arrays")

Cletters myText:("h e l l o w o r l d !")
msg.log:("myText")

Cletters greeting:("م ر ح ب ا")
msg.log:("greeting")

get lib:("calculator")
var = x;
x = 10;
msg.log:("x * 3 + 5")

pass!`);
    };
    
    window.downloadCode = function() {
        if (!monacoEditor) return;
        const blob = new Blob([monacoEditor.getValue()], {type:'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'script.roland';
        a.click();
        URL.revokeObjectURL(a.href);
    };
    
    window.toggleSettingsMenu = function(e) {
        e.stopPropagation();
        document.getElementById('shareMenu').classList.remove('show');
        document.getElementById('settingsMenu').classList.toggle('show');
    };
    
    window.toggleShareMenu = function(e) {
        e.stopPropagation();
        document.getElementById('settingsMenu').classList.remove('show');
        document.getElementById('shareMenu').classList.toggle('show');
    };
    
    window.onclick = function(e) {
        const settingsMenu = document.getElementById('settingsMenu');
        const shareMenu = document.getElementById('shareMenu');
        if (settingsMenu && settingsMenu.classList.contains('show') && !e.target.closest('.btn')) {
            settingsMenu.classList.remove('show');
        }
        if (shareMenu && shareMenu.classList.contains('show') && !e.target.closest('.btn')) {
            shareMenu.classList.remove('show');
        }
    };
    
    window.closeSplash = function() {
        document.getElementById('splash')?.remove();
    };
    
    // Initialize Monaco
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
    require(['vs/editor/editor.main'], function() {
        monaco.languages.register({ id: 'roland' });
        monaco.languages.setMonarchTokensProvider('roland', { 
            tokenizer: { 
                root: [
                    [/hi roland\.script!/, "keyword-start"], 
                    [/pass!|end!/, "keyword-stop"],
                    [/var|Dnumber|character|word|TFvar/, "type"],
                    [/if var|if typed|get lib:|reload!|greet|bookname:|line for class:|Cletters/, "function"],
                    [/msg\.(log|out):/, "function"], 
                    [/"([^"\\]|\\.)*"/, "string"],
                    [/\b\d+(\.\d+)?\b/, "number"], 
                    [/\b(true|false)\b/, "constant"], 
                    [/[=;():]/, "delimiter"],
                ] 
            } 
        });
        monaco.editor.defineTheme('rolandTheme', {
            base: 'vs-dark', 
            inherit: true,
            rules: [
                { token: 'keyword-start', foreground: '569CD6', fontStyle: 'bold' },
                { token: 'keyword-stop', foreground: 'F44747', fontStyle: 'bold' },
                { token: 'type', foreground: '569CD6' }, 
                { token: 'function', foreground: 'DCDCAA' },
                { token: 'string', foreground: 'CE9178' }
            ],
            colors: { 'editor.background': '#1e1e1e' }
        });
        monacoEditor = monaco.editor.create(document.getElementById('editor-container'), {
            value: `hi roland.script!
bookname:("Arrays & Cletters Roland Script 2.0")

line for class:[apple, IDE, message,]


line for class = ("Arrays")
msg.log:("Arrays")

Cletters message:("h e l l o   w o r l d !")
msg.log:("message")

Cletters arabic:("م ر ح ب ا   ب ك")
msg.log:("arabic")

get lib:("calculator")
var = num;
num = 15;
msg.log:("num * 2 + 10")

pass!`,
            language: 'roland', 
            theme: 'rolandTheme', 
            fontSize: 16, 
            automaticLayout: true
        });
    });
})();
</script>
