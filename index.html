
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Restudio Not Found 404</title>
<link rel="icon" type="image/png" href="https://i.postimg.cc/JzYGnt17/restudio-profile.png">

<link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #ffffff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .navbar {
        background-color: #000;
        height: 60px;
        display: flex;
        align-items: center;
        padding: 0 15px;
        flex-shrink: 0;
    }


    .logo {
        height: 40px;
        width: auto;
        object-fit: contain;
    }


    .main-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: #ffffff;
        gap: 24px;
    }


    .center-image {
        max-width: 90%;
        max-height: 55vh;
        width: auto;
        height: auto;
        object-fit: contain;
        display: block;
        

        border: none !important;
        outline: none !important;
        background: transparent !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
        border-radius: 0 !important;
    }


    .tiny-text {
        font-family: 'Tiny5', monospace;
        font-size: 12px;
        letter-spacing: 0.5px;
        color: #333333;
        text-align: center;
        line-height: 1.5;
        max-width: 85%;
        margin: 0 auto;
        background: transparent;
        border: none;
        padding: 0;

        border: none !important;
        outline: none !important;
        box-shadow: none !important;
    }


    @media (max-width: 600px) {
        .center-image {
            max-width: 95%;
            max-height: 50vh;
        }
        .navbar {
            padding: 0 12px;
        }
        .logo {
            height: 34px;
        }
        .tiny-text {
            font-size: 10px;
            max-width: 90%;
        }
        .main-container {
            gap: 18px;
            padding: 15px;
        }
    }


    @media (min-width: 768px) {
        .tiny-text {
            font-size: 20px;
        }
    }


    .main-container,
    .main-container * {
        border: none;
        outline: none;
        box-shadow: none;
    }
</style>
</head>
<body>


<div class="navbar">
    <img src="https://i.postimg.cc/B65yV9Bw/swrh-restudio.png" class="logo" alt="Restudio logo">
</div>


<div class="main-container">
    <img src="https://i.postimg.cc/05FmBMbx/lqtt-shasht-2026-04-25-214004.png" 
         alt="404" 
         class="center-image">
    

<div class="tiny-text">
    Restudio Script Editor public version was discontinued on June 19, 2026.<br><br>
    An <strong>Institutional Version</strong> is available for approved users only.<br>
    To request access, contact Restudio Support.<br><br>
    <a href="mailto:restudiosupport@gmail.com" style="color: #333; text-decoration: underline;">
        Request Institutional Access🖤
    </a>
</div>

</body>
</html>
